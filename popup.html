<!DOCTYPE html>
<html>
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=320">
  <title>PennyPounce</title>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      width: 320px;
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
      background: #fdf7ed;        /* warm light background */
      color: #3b0820;             /* deep plum text */
    }

    .header {
      background: #fdf1dc;        /* light warm band */
      border-bottom: 2px solid #7a1740;
      padding: 8px 16px 12px;
      display: flex;
      flex-direction: column;
      gap: 4px;
    }

    .header-toprow {
      display: flex;
      justify-content: flex-end;
    }

    .account-btn {
      background: none;
      border: none;
      color: #7a1740;
      font-size: 10px;
      font-weight: 600;
      cursor: pointer;
      text-decoration: underline;
      padding: 0;
      font-family: inherit;
    }

    .header-brand {
      display: flex;
      align-items: center;
      gap: 8px;
    }

    .header-title-group {
      display: flex;
      flex-direction: column;
      gap: 2px;
    }

    .header h1 {
      font-size: 16px;
      font-weight: 700;
      line-height: 1;
    }

    .brand-primary {
      color: #7a1740;             /* plum for 'Penny' */
    }

    .brand-accent {
      color: #f4a824;             /* gold for 'Pounce' */
    }

    .tier-label {
      font-size: 9px;
      font-weight: 300;
      color: #6b4c2c;
      vertical-align: sub;
      margin-left: 4px;
      letter-spacing: 0.04em;
    }

    .header-subtitle {
      font-size: 11px;
      color: #9b4b2d;
      opacity: 0.9;
      font-style: italic;
    }

    .logo-img {
      width: 48px;
      height: 48px;
      object-fit: contain;
      flex-shrink: 0;
    }

    .content {
      padding: 16px;
    }

    .product-info {
      background: #fff8ef;
      border-radius: 10px;
      padding: 12px;
      margin-bottom: 12px;
      border: 1px solid #f2d3a4;
    }

    .product-info h2 {
      font-size: 12px;
      color: #9b4b2d;
      margin-bottom: 4px;
      text-transform: uppercase;
      letter-spacing: 0.03em;
      font-weight: 600;
    }

    .product-info p {
      font-size: 13px;
      line-height: 1.4;
      max-height: 40px;
      overflow: hidden;
      color: #3b0820;
    }

    .btn {
      background: #f4a824;        /* gold like coin */
      color: #3b0820;
      border: none;
      width: 100%;
      padding: 12px;
      border-radius: 9999px;
      font-size: 14px;
      font-weight: 700;
      cursor: pointer;
      transition: background 0.2s, transform 0.1s;
      box-shadow: 0 3px 6px rgba(0,0,0,0.18);
    }

    .btn:hover {
      background: #f29b11;
      transform: translateY(-1px);
    }

    .btn:disabled {
      background: #e2c48a;
      cursor: not-allowed;
      box-shadow: none;
    }

    @property --border-angle {
      syntax: '<angle>';
      initial-value: 0deg;
      inherits: false;
    }

    @keyframes border-rotate {
      to { --border-angle: 360deg; }
    }

    .ai-btn-wrapper {
      position: relative;
      border-radius: 9999px;
      padding: 2px;
      background: conic-gradient(
        from var(--border-angle),
        #7a1740 0%,
        #f4a824 25%,
        #7a1740 50%,
        #f4a824 75%,
        #7a1740 100%
      );
      animation: border-rotate 2s linear infinite;
      margin-top: 0;
    }

    .ai-action-btn {
      background: #ffffff;
      color: #7a1740;
      border: none;
      width: 100%;
      padding: 12px;
      border-radius: 9999px;
      font-size: 14px;
      font-weight: 700;
      cursor: pointer;
      transition: background 0.2s, transform 0.1s;
      font-family: inherit;
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 2px;
    }

    .ai-action-btn:hover {
      background: #f5f5f5;
      transform: translateY(-1px);
    }

    .ai-action-btn:disabled {
      opacity: 0.6;
      cursor: not-allowed;
      transform: none;
    }

    .btn-label-main {
      color: #7a1740;
      font-size: 14px;
      font-weight: 700;
      line-height: 1;
    }

    .btn-label-sub {
      color: #7a1740;
      font-size: 9px;
      font-weight: 300;
      line-height: 1;
      opacity: 0.75;
      letter-spacing: 0.02em;
    }

    .daily-searches {
      text-align: center;
      font-size: 11px;
      color: #7a1740;
      margin-top: 6px;
      font-weight: 600;
    }

    .ai-panel {
      margin-top: 10px;
      padding: 10px;
      background: #fff8ef;
      border-radius: 10px;
      border: 1px solid #f2d3a4;
      font-size: 12px;
      line-height: 1.45;
      color: #3b0820;
      max-height: 160px;
      overflow-y: auto;
      display: none;
    }

    .ai-panel.visible {
      display: block;
    }

    .results {
      margin-top: 12px;
      max-height: 300px;
      overflow-y: auto;
    }

    .result-item {
      background: #fff8ef;
      border-radius: 10px;
      padding: 10px;
      margin-bottom: 8px;
      display: flex;
      justify-content: space-between;
      align-items: center;
      gap: 8px;
      border: 1px solid #f2d3a4;
    }

    .rank-badge {
      flex-shrink: 0;
      width: 22px;
      height: 22px;
      border-radius: 50%;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 11px;
      font-weight: 800;
      line-height: 1;
    }

    .rank-badge.rank-1 {
      background: #f4a824;
      color: #3b0820;
      box-shadow: 0 1px 4px rgba(244,168,36,0.5);
    }

    .rank-badge.rank-2 {
      background: #a8a8b3;
      color: #fff;
      box-shadow: 0 1px 4px rgba(0,0,0,0.18);
    }

    .rank-badge.rank-3 {
      background: #c07c3a;
      color: #fff;
      box-shadow: 0 1px 4px rgba(192,124,58,0.45);
    }

    .result-info {
      flex: 1;
      min-width: 0;
    }

    .result-info .store {
      font-size: 11px;
      color: #7a1740;
      text-transform: uppercase;
      font-weight: 700;
      letter-spacing: 0.04em;
    }

    .result-info .title {
      font-size: 12px;
      color: #3b0820;
      line-height: 1.3;
      margin-top: 2px;
    }

    .result-info .rating {
      font-size: 11px;
      color: #f59e0b;
      margin-top: 2px;
    }

    .result-right {
      display: flex;
      flex-direction: column;
      align-items: flex-end;
      gap: 4px;
    }

    .result-right .price {
      font-size: 14px;
      font-weight: 700;
      color: #3b0820;
    }

    .result-right a {
      background: #7a1740;
      color: #fdf7ed;
      text-decoration: none;
      padding: 4px 10px;
      border-radius: 9999px;
      font-size: 11px;
      font-weight: 600;
      white-space: nowrap;
    }

    .loading {
      text-align: center;
      padding: 20px;
      color: #9b4b2d;
      font-size: 13px;
    }

    .error {
      background: #fbe4e4;
      color: #7f1d1d;
      padding: 12px;
      border-radius: 8px;
      font-size: 12px;
      border: 1px solid #fecaca;
    }

  </style>
</head>
<body>
  <div class="header">
    <div class="header-toprow">
      <button type="button" id="openSettings" class="account-btn">Account</button>
    </div>
    <div class="header-brand">
      <img src="fox-jumping.png" alt="PennyPounce fox" class="logo-img">
      <div class="header-title-group">
        <h1>
          <span class="brand-primary">Penny</span><span class="brand-accent">Pounce</span><span class="tier-label" id="tierLabel"></span>
        </h1>
        <div class="header-subtitle"><em>Pounce on savings</em></div>
      </div>
    </div>
  </div>
  <div class="content">
    <div class="product-info">
      <h2>Current Product</h2>
      <p id="productName">Loading...</p>
    </div>
    <button id="searchBtn" class="btn">Compare Prices</button>
    <div class="ai-btn-wrapper" id="aiBtnWrapper" style="display:none">
      <button id="aiBtn" class="ai-action-btn" type="button">
        <span class="btn-label-main" id="aiBtnLabel">Penn's Take</span>
        <span class="btn-label-sub">- Powered by Gemini</span>
      </button>
    </div>
    <div id="dailySearches" class="daily-searches" style="display:none"></div>
    <div id="aiPanel" class="ai-panel"></div>
    <div id="results" class="results"></div>
  </div>
  <script src="config.js"></script>
  <script src="popup.js"></script>
</body>
</html>
