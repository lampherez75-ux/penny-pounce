<!DOCTYPE html>
<html>
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=320px">
  <title>PennyPounce</title>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      width: 320px;
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
      background: #0f1020;
      color: #f9fafb;
    }

    .header {
      background: #7c3aed;
      padding: 12px 16px;
      display: flex;
      align-items: center;
      gap: 8px;
    }

    .header-title-group {
      display: flex;
      flex-direction: column;
      gap: 2px;
    }

    .header h1 {
      font-size: 16px;
      font-weight: 600;
    }

    .header-subtitle {
      font-size: 11px;
      color: #e5e7eb;
      opacity: 0.85;
    }

    .logo-circle {
      width: 28px;
      height: 28px;
      border-radius: 9999px;
      background: #fbbf24;
      color: #111827;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 12px;
      font-weight: 700;
      flex-shrink: 0;
    }

    .content {
      padding: 16px;
    }

    .product-info {
      background: #111827;
      border-radius: 8px;
      padding: 12px;
      margin-bottom: 12px;
    }

    .product-info h2 {
      font-size: 12px;
      color: #9ca3af;
      margin-bottom: 4px;
    }

    .product-info p {
      font-size: 13px;
      line-height: 1.4;
      max-height: 40px;
      overflow: hidden;
    }

    .btn {
      background: #7c3aed;
      color: #f9fafb;
      border: none;
      width: 100%;
      padding: 12px;
      border-radius: 6px;
      font-size: 14px;
      font-weight: 600;
      cursor: pointer;
      transition: background 0.2s;
    }

    .btn:hover {
      background: #6d28d9;
    }

    .btn:disabled {
      background: #4b5563;
      cursor: not-allowed;
    }

    .results {
      margin-top: 12px;
      max-height: 300px;
      overflow-y: auto;
    }

    .result-item {
      background: #111827;
      border-radius: 8px;
      padding: 10px;
      margin-bottom: 8px;
      display: flex;
      justify-content: space-between;
      align-items: center;
      gap: 8px;
    }

    .result-info {
      flex: 1;
      min-width: 0;
    }

    .result-info .store {
      font-size: 11px;
      color: #fbbf24;
      text-transform: uppercase;
      font-weight: 600;
    }

    .result-info .title {
      font-size: 12px;
      color: #e5e7eb;
      line-height: 1.3;
      margin-top: 2px;
    }

    .result-info .rating {
      font-size: 11px;
      color: #fbbf24;
      margin-top: 2px;
    }

    .result-right {
      display: flex;
      flex-direction: column;
      align-items: flex-end;
      gap: 4px;
    }

    .result-right .price {
      font-size: 14px;
      font-weight: 700;
      color: #f9fafb;
    }

    .result-right a {
      background: #fbbf24;
      color: #111827;
      text-decoration: none;
      padding: 4px 10px;
      border-radius: 4px;
      font-size: 11px;
      font-weight: 600;
      white-space: nowrap;
    }

    .loading {
      text-align: center;
      padding: 20px;
      color: #9ca3af;
      font-size: 13px;
    }

    .error {
      background: #3f1f2b;
      color: #fecaca;
      padding: 12px;
      border-radius: 8px;
      font-size: 12px;
    }
  </style>
</head>
<body>
  <div class="header">
    <div class="logo-circle">PP</div>
    <div class="header-title-group">
      <h1>PennyPounce</h1>
      <div class="header-subtitle">Smart price comparison</div>
    </div>
  </div>
  <div class="content">
    <div class="product-info">
      <h2>Current Product</h2>
      <p id="productName">Loading...</p>
    </div>
    <button id="searchBtn" class="btn">Compare Prices</button>
    <div id="results" class="results"></div>
  </div>
  <script src="popup.js"></script>
</body>
</html>
